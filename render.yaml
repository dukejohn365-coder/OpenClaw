services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free

    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "10000"

      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"

      # OpenClaw directories
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw

      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace

      # Gateway token
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      #################################################
      # OLLAMA CLOUD CONFIG
      #################################################

      - key: OLLAMA_API_KEY
        sync: false

      - key: OLLAMA_HOST
        value: https://ollama.com

      #################################################
      # DATABASE
      #################################################

      - key: DATABASE_URL
        sync: false

      #################################################
      # OPTIONAL
      #################################################

      - key: OPENCLAW_LOG_LEVEL
        value: info
